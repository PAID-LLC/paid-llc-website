name: Supabase Keep-Alive

on:
  schedule:
    # Every 4 days at 08:00 UTC — keeps Supabase project from pausing (7-day inactivity limit)
    - cron: "0 8 */4 * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://paiddev.com/api/health)
          echo "Health endpoint returned: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "WARNING: health check returned $STATUS"
            exit 1
          fi
